# Change these first
owner: nanoolabs # Your GitHub organization or username, where this repository lives
repo: status # The name of this repository
cname: status.nanoolabs.dev

sites:
  - name: Nanoo Labs
    url: https://nanoolabs.dev
  - name: Nanoo Root
    url: https://root.nanoolabs.dev
  - name: Nanoo Webrings
    url: https://webrings.nanoolabs.dev
  - name: Nanoo Stack
    url: https://stack.nanoolabs.dev
  - name: Nanoo Docs
    url: https://docs.nanoolabs.dev
  - name: Nanoo CDN
    url: https://cdn.nanoolabs.dev

status-website:
  cname: status.nanoolabs.dev
  logoUrl: https://raw.githubusercontent.com/nanoolabs/changelog/main/brands/v.1.5.0/nanoo-dark.svg
  name: "Nanoo Labs | Health"
  introTitle: "**Nanoo Labs Health**"
  introMessage: "Real-time monitoring for our high-performance ecosystems and experimental platforms. Built fast, simple, and scalable."
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
    - title: Nanoo Labs
      href: https://nanoolabs.dev
  theme: dark
  css: |
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
    body { 
      font-family: 'Inter', sans-serif !important; 
      background-color: #000000 !important;
      color: #ffffff !important;
    }
    h1, h2, h3, .micro-cap, header a, footer a { 
      text-transform: uppercase !important; 
      letter-spacing: 0.15em !important;
      font-weight: 700 !important;
    }
    .card, header, footer { 
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
      background: rgba(255, 255, 255, 0.02) !important;
    }
    .btn-spasex {
      border: 1px solid white;
      padding: 0.5rem 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .status-up, .success { color: #00f2ff !important; }
    .bg-success { background-color: #00f2ff !important; }

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
