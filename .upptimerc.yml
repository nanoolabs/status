# Change these first
owner: nanoolabs # Your GitHub organization or username, where this repository lives
repo: status # The name of this repository

sites:
  - name: Nanoo Labs
    url: https://nanoolabs.dev
  - name: Nanoo Root
    url: https://root.nanoolabs.dev
  - name: Nanoo Webrings
    url: https://webrings.nanoolabs.dev
  - name: Nanoo Stack
    url: https://stack.nanoolabs.dev
  - name: Nanoo Docs
    url: https://docs.nanoolabs.dev
  - name: Nanoo CDN
    url: https://cdn.nanoolabs.dev

status-website:
  theme: dark
  cname: status.nanoolabs.dev
  logoUrl: https://cdn.nanoolabs.dev/brands/latest/nanoo-dark.svg
  name: "Nanoo Labs"
  introTitle: "**Nanoo Labs Status**"
  introMessage: "Real-time monitoring for our high-performance ecosystems and experimental platforms."
  customHeadHtml: |
    <style>
      :root {
        --body-background-color: #050505;
        --body-text-color: #f2f2f2;
        --card-background-color: #0a0a0a;
        --card-border-color: #1f2937;
        --nav-background-color: #0a0a0a;
        --nav-border-bottom-color: #1f2937;
        --nav-current-border-bottom-color: #00ffff;
        --up-border-left-color: #00ffff;
        --tag-color: #050505;
        --tag-up-background-color: #00ffff;
        --submit-button-border-color: #00ffff;
        --submit-button-background-color: #00ffff;
        --submit-button-color: #000000;
        --graph-opacity: 1;
        --graph-filter: none;
      }
      body {
        font-family: system-ui, sans-serif !important;
      }
      .container {
        max-width: 64rem !important;
      }
      article {
        border-radius: 0.5rem !important;
      }
      .tag {
        border-radius: 9999px !important;
      }
    </style>
  navbar:
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
    - title: Nanoo
      href: https://nanoolabs.dev

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
